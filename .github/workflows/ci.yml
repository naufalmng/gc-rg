name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Go test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
          cache: true

      - name: Test
        run: go test ./...

      - name: Build
        run: |
          go build -o bin/gc-rg-generate ./cmd/generate-daily-report
          go build -o bin/gc-rg-email ./cmd/send-email-report
