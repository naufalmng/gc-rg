name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Go test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
          cache: true

      - name: Test
        run: go test ./...

      - name: Build and verify installer
        run: |
          bash scripts/build.sh
          bash tests/installer_smoke.sh

      - name: Live Ubuntu install verification
        run: bash tests/installer_live_ubuntu.sh
